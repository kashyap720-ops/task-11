<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Thala 7</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<nav class="navbar">
<div class="logo">
<span class="orange">Thala</span>
<span class="blue">7.</span>
</div>
<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="#">Contact</a></li>
</ul>
<div class="nav-icons">
<a href="cart.html">
<i class="fa-solid fa-cart-shopping"></i>
</a>
<img src="https://i.pravatar.cc/100"
class="profile"
alt="Profile">
</div>
</nav>
</header>
<section class="checkout-container">
<div class="billing">
<h2>Billing Details</h2>
<form>
<div class="row">
<div class="input-box">
<label>First Name</label>
<input type="text" placeholder="John">
</div>
<div class="input-box">
<label>Last Name</label>
<input type="text" placeholder="Doe">
</div>
</div>
<div class="input-box">
<label>Email</label>
<input type="email" placeholder="john@gmail.com">
</div>
<div class="input-box">
<label>Phone Number</label>
<input type="tel" placeholder="+91 9876543210">
</div>
<div class="input-box">
<label>Address</label>
<input type="text" placeholder="Street Address">
</div>
<div class="row">
<div class="input-box">
<label>City</label>
<input type="text" placeholder="Bangalore">
</div>
<div class="input-box">
<label>State</label>
<input type="text" placeholder="Karnataka">
</div>
</div>
<div class="row">
<div class="input-box">
<label>Country</label>
<input type="text" placeholder="India">
</div>
<div class="input-box">
<label>Pincode</label>
<input type="text" placeholder="560064">
</div>
</div>

<h2>Payment Method</h2>

<div class="payment-method">

<label>
<input type="radio" name="payment" checked>
Credit / Debit Card
</label>

<label>
<input type="radio" name="payment">
UPI
</label>

<label>
<input type="radio" name="payment">
Cash On Delivery
</label>

</div>

<div class="input-box">
<label>Card Number</label>
<input type="text" placeholder="1234 5678 9012 3456">
</div>

<div class="row">

<div class="input-box">
<label>Expiry</label>
<input type="text" placeholder="MM/YY">
</div>

<div class="input-box">
<label>CVV</label>
<input type="password" placeholder="123">
</div>

</div>

<button class="place-order">
Place Order
</button>

</form>

</div>



<div class="order-summary">

<h2>Order Summary</h2>

<div class="summary-item">
<span>Thala 7 Sneakers</span>
<span>₹4,999</span>
</div>

<div class="summary-item">
<span>Urban Runner</span>
<span>₹3,999</span>
</div>

<hr>

<div class="summary-item">
<span>Subtotal</span>
<span>₹8,998</span>
</div>

<div class="summary-item">
<span>Shipping</span>
<span>₹150</span>
</div>

<div class="summary-item">
<span>Discount</span>
<span>-₹500</span>
</div>

<hr>

<div class="summary-item total">
<strong>Total</strong>
<strong>₹8,648</strong>
</div>

<button class="pay-btn">
Pay Now
</button>

</div>

</section>



<footer>

<p>
© 2026 Thala 7 Sneaker Store. All Rights Reserved.
</p>

</footer>

</body>
</html>
